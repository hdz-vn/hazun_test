<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Testfork</title>

    <script>
        fetch('/hazun_test/templates/head.html')
            .then(res => res.text())
            .then(html => {
                document.head.insertAdjacentHTML('beforeend', html);
            })
            .catch(err => console.error('Lỗi tải bảo mật:', err));
    </script>
</head>
<body>

    <div id="menu"></div>
    <div id="clock"></div>
    <div id="chat"></div>

    <h1>IDK dành cho bạn</h1>

    <p>
        Nội dung của bạn ở đây nha. Có thể viết bất cứ gì. Nhưng mà thoát hay tải lại trang là mất á =)))
    </p>

    <div style="background: #e8f4fd; padding: 20px; border-radius: 10px; margin: 20px 0;">
        <label for="myNote" style="font-weight: bold;">📝 Ghi chú:</label>
        <textarea id="myNote" rows="4" placeholder="Viết gì đó ở đây..." style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #3498db; font-size: 16px;"></textarea>
    </div>

    <button class="pdf-btn" onclick="window.print()">📄 Lưu trang này thành PDF</button>

    <script src="templates/load.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadTemplate('menu', 'menu.html');
            loadTemplate('clock', 'clock.html');
            loadTemplate('chat', 'chat.html');
        });
    </script>
    
</body>
</html>
