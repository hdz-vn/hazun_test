<div id="menu" style="background: #2c3e50; padding: 10px 20px; margin-bottom: 20px; border-radius: 8px;">
    <a href="/hazun_test/" style="color: white; margin-right: 20px; text-decoration: none;">🏠 Trang chủ</a>
    <span id="menu-auto"></span>
</div>

<script>
    fetch('https://api.github.com/repos/haphantridungqsqn-spec/hazun_test/contents/')
        .then(res => res.json())
        .then(files => {
            const menu = document.getElementById('menu-auto');
            if (!menu) return;
            files.forEach(file => {
                if (file.name.endsWith('.html') && file.name !== 'index.html') {
                    const name = file.name.replace('.html', '');
                    const link = document.createElement('a');
                    link.href = `/hazun_test/${name}`;
                    link.textContent = `📄 ${name.replace(/-/g, ' ')}`;
                    link.style.cssText = 'color: white; margin-right: 20px; text-decoration: none;';
                    menu.appendChild(link);
                }
            });
        });
</script>
