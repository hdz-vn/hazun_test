<style>
    /* Màn hình chờ (loading overlay) */
    #loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
        font-family: 'Segoe UI', sans-serif;
        color: #2c3e50;
    }
    /* Ẩn nội dung chính khi chưa load xong */
    #main-content {
        opacity: 0;
        transition: opacity 0.3s ease;
    }
    /* Hiển thị khi load xong */
    body.loaded #loading-overlay {
        opacity: 0;
        visibility: hidden;
    }
    body.loaded #main-content {
        opacity: 1;
    }
</style>
