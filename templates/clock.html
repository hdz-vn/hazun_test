<div style="text-align: right; margin: 10px 0;">
    <div style="display: inline-block; background: #e8f4fd; padding: 6px 12px; border-radius: 20px; border-left: 3px solid #3498db;">
        🕒 <span id="currentTimeVN">--:--:--</span> (UTC+7)
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        const timeString = now.toLocaleString('vi-VN', {
            timeZone: 'Asia/Ho_Chi_Minh',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        });
        const el = document.getElementById('currentTimeVN');
        if (el) el.textContent = timeString;
    }
    updateClock();
    setInterval(updateClock, 1000);
</script>
