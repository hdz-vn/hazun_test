<!DOCTYPE html>
<html>
<head>
    <title>Wikiseme – Hazun Test</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .edit-area { width: 100%; height: 400px; font-family: monospace; padding: 10px; margin: 10px 0; border: 1px solid #3498db; border-radius: 8px; }
        button { background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-right: 10px; }
        button:hover { background: #2980b9; }
        .history-item { background: white; padding: 10px; margin: 10px 0; border-left: 3px solid #3498db; font-size: 0.9em; }
    </style>
    <script>
        // Tải head.html (các meta bảo mật, v.v.)
        fetch('/hazun_test/templates/head.html')
            .then(res => res.text())
            .then(html => document.head.insertAdjacentHTML('beforeend', html))
            .catch(err => console.error('Lỗi tải head.html:', err));
    </script>
</head>
<body>
    <header role="banner">
        <div id="menu-place"></div>
        <div id="clock-place"></div>
        <div id="chat-place"></div>
    </header>
    <div id="content-area"><h1>Đang tải nội dung...</h1></div>
    <div id="history-area" style="margin-top: 30px;"></div>

    <script>
        const OWNER = 'haphantridungqsqn-spec';
        const REPO = 'hazun_test';
        const ISSUE_NUMBER = 1;
        const CLIENT_ID = 'Ov23liq2gWzrIA8KhDVK';

        // ======================= CÁC HÀM CHÍNH =======================
        function getTokenFromUrl() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            return params.get('access_token');
        }

        async function loadContent() {
            try {
                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues/${ISSUE_NUMBER}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const issue = await res.json();
                const htmlContent = marked.parse(issue.body || '*Chưa có nội dung.*');
                document.getElementById('content-area').innerHTML = `<div>${htmlContent}</div>`;
            } catch (err) {
                console.error('Lỗi load content:', err);
                document.getElementById('content-area').innerHTML = '<p>⚠️ Lỗi khi tải nội dung.</p>';
            }
        }

        async function checkCollaborator(token) {
            try {
                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/collaborators`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (!res.ok) return false;
                const collaborators = await res.json();
                const userRes = await fetch('https://api.github.com/user', {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (!userRes.ok) return false;
                const currentUser = await userRes.json();
                return collaborators.some(collab => collab.login === currentUser.login);
            } catch (err) {
                console.error('Lỗi kiểm tra collaborator:', err);
                return false;
            }
        }

        function showEditForm(currentContent) {
            const contentDiv = document.getElementById('content-area');
            const originalContent = contentDiv.innerHTML;
            contentDiv.innerHTML = `
                <textarea id="edit-textarea" class="edit-area">${currentContent}</textarea>
                <div style="margin-top: 10px;">
                    <button id="save-btn">💾 Lưu nội dung</button>
                    <button id="cancel-btn">❌ Hủy</button>
                </div>
            `;
            document.getElementById('save-btn').onclick = async () => {
                const newBody = document.getElementById('edit-textarea').value;
                const token = localStorage.getItem('gh_token');
                if (!token) {
                    alert('Vui lòng đăng nhập lại.');
                    return;
                }
                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues/${ISSUE_NUMBER}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ body: newBody })
                });
                if (res.ok) {
                    alert('✅ Đã lưu thành công!');
                    await loadContent();
                    await loadHistory();
                } else {
                    alert('❌ Lỗi khi lưu! Kiểm tra token hoặc quyền.');
                }
            };
            document.getElementById('cancel-btn').onclick = () => {
                contentDiv.innerHTML = originalContent;
                attachEditButton(); // Gắn lại nút Sửa
            };
        }

        async function loadHistory() {
            const token = localStorage.getItem('gh_token');
            if (!token) return;
            try {
                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues/${ISSUE_NUMBER}/timeline`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (!res.ok) return;
                const events = await res.json();
                const historyHtml = events.filter(e => e.event === 'commented' || e.event === 'renamed').map(e => `
                    <div class="history-item">
                        <strong>${e.actor?.login || 'System'}</strong> đã ${e.event === 'commented' ? 'bình luận' : 'đổi tên'} vào lúc ${new Date(e.created_at).toLocaleString()}
                    </div>
                `).join('');
                document.getElementById('history-area').innerHTML = `<h3>📜 Lịch sử chỉnh sửa</h3>${historyHtml || 'Chưa có hoạt động nào.'}`;
            } catch(err) { console.error(err); }
        }

        function attachEditButton() {
            const contentDiv = document.getElementById('content-area');
            if (!document.getElementById('dynamic-edit-btn')) {
                const editBtn = document.createElement('button');
                editBtn.id = 'dynamic-edit-btn';
                editBtn.textContent = '✏️ Sửa trang này';
                editBtn.style.marginTop = '20px';
                editBtn.onclick = async () => {
                    let savedToken = localStorage.getItem('gh_token');
                    if (!savedToken) {
                        const redirectUri = window.location.href.split('#')[0]; // Lấy URL hiện tại, bỏ phần sau # (nếu có)
                        window.location.href = `https://github.com/login/oauth/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=repo`;
                    }
                    const isCollaborator = await checkCollaborator(savedToken);
                    if (isCollaborator) {
                        const issueRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues/${ISSUE_NUMBER}`);
                        const issue = await issueRes.json();
                        showEditForm(issue.body);
                    } else {
                        alert('⚠️ Bạn không có quyền sửa trang này. Chỉ Collaborator mới được sửa.');
                    }
                };
                contentDiv.appendChild(editBtn);
            }
        }

        // ======================= HÀM TẢI TEMPLATE =======================
        async function loadTemplate(id, fileName) {
            try {
                const res = await fetch(`/hazun_test/templates/${fileName}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const html = await res.text();
                const el = document.getElementById(id);
                if (el) el.innerHTML = html;
            } catch (err) {
                console.error(`Lỗi tải ${fileName}:`, err);
                const el = document.getElementById(id);
                if (el) el.innerHTML = `<p style="color:red;">⚠️ Không thể tải ${fileName}</p>`;
            }
        }

        // ======================= KHỞI TẠO =======================
        (async function init() {
            // Xử lý token từ URL
            const token = getTokenFromUrl();
            if (token) {
                localStorage.setItem('gh_token', token);
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            // Tải các thành phần chính
            await loadContent();
            await loadHistory();
            attachEditButton();

            // Tải menu, clock, chat (chạy ngầm, không await để tránh chậm)
            loadTemplate('menu-place', 'menu.html');
            loadTemplate('clock-place', 'clock.html');
            loadTemplate('chat-place', 'chat.html');
        })();
    </script>
</body>
</html>
