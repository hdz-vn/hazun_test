<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Wikiseme</title>
    
    <script>
        fetch('/hazun_test/templates/head.html')
            .then(res => res.text())
            .then(html => {
                document.head.insertAdjacentHTML('beforeend', html);
            })
            .catch(err => console.error('Lỗi tải bảo mật:', err));
    </script>
</head>
<body>
    <header role="banner">
        <div id="menu"></div>
        <div id="clock"></div>
        <div id="chat"></div>
    </header>

    <main role="main">
        <div style="text-align: center; margin: 30px 0;">
            <a href="https://github.com/haphantridungqsqn-spec/hazun_test/issues/1" 
               target="_blank" 
               style="background: #3498db; color: white; padding: 10px 20px; border-radius: 40px; text-decoration: none; display: inline-block;">
                ✏️ Sửa nội dung trên GitHub
            </a>
        </div>
    </main>

    <footer role="contentinfo">
        <button class="pdf-btn" onclick="window.print()">📄 Lưu trang này thành PDF</button>
    </footer>

    <script src="templates/load.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadTemplate('menu', 'menu.html');
            loadTemplate('clock', 'clock.html');
            loadTemplate('chat', 'chat.html');
        });
    </script>
</body>
</html>
