<!DOCTYPE html>
<html>
<head>
    <title>Trang Test của Hazun</title>
    <link rel="stylesheet" href="style.css">
    
    <script>
        // Tải meta bảo mật từ template và chèn vào head
        fetch('/hazun_test/templates/security.html')
            .then(res => res.text())
            .then(html => {
                document.head.insertAdjacentHTML('beforeend', html);
            })
            .catch(err => console.error('Lỗi tải bảo mật:', err));
    </script>
</head>
<body>

    <h1>Chào mừng đến với web test của tôi!</h1>
    <p>📝 Đây là trang web mà tôi bắt đầu tập tành khi tôi đến với Github đấy ^-^</p>
    <p class="sp">Tên trong Toki Pona (Sitelen Pona): 󱤑󱦐󱤰󱤀󱤑󱤀󱦆󱦑</p>

    <button class="pdf-btn" onclick="window.print()">📄 Lưu trang này thành PDF</button>

    <script>
        fetch('/hazun_test/templates/menu.html')
                .then(res => res.text())
                .then(html => document.getElementById('menu').innerHTML = html)
                .catch(err => console.error('Lỗi menu:', err));
        fetch('/hazun_test/templates/clock.html')
                .then(res => res.text())
                .then(html => document.getElementById('clock').innerHTML = html)
                .catch(err => console.error('Lỗi clock:', err));
        fetch('/hazun_test/templates/chat.html')
            .then(res => res.text())
            .then(html => document.getElementById('chat').innerHTML = html)
            .catch(err => console.error('Lỗi chat:', err));
    </script>
</body>
</html>
