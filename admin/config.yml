backend:
  name: git-gateway   # Dùng Netlify Identity để xác thực [citation:1]
  branch: main        # Nhánh chính trên GitHub của cậu

# Thư mục lưu ảnh khi cậu tải lên
media_folder: "images/uploads"
public_folder: "/images/uploads"

# BẬT CHẾ ĐỘ DUYỆT BÀI (khuyến khích dùng)
publish_mode: editorial_workflow  # Thêm dòng này để có chế độ bản nháp [citation:3]
collections:
  - name: "pages"                       # Tên định danh (dùng trong code)
    label: "📄 Trang con"               # Tên hiển thị trong CMS
    label_singular: "📄 Trang"          
    folder: "content/pages"            # Thư mục chứa file trên GitHub
    create: true                       # Cho phép tạo trang mới
    slug: "{{slug}}"                   # Tên file sẽ là tên cậu đặt (vd: gioi-thieu.md)
    fields:                            # ⬇️ CÁC Ô NHẬP LIỆU ⬇️
      - label: "Tiêu đề trang"
        name: "title"
        widget: "string"               # Ô nhập văn bản ngắn
        hint: "Đây là tiêu đề chính của trang."
      
      - label: "Nội dung chính"
        name: "body"
        widget: "markdown"             # ⭐ Ô SOẠN THẢO CHÍNH (có in đậm, in nghiêng...)
        hint: "Soạn nội dung cho trang tại đây."
      
      - label: "Ngày tạo (tùy chọn)"
        name: "date"
        widget: "datetime"             # Ô chọn ngày giờ
        required: false                # Không bắt buộc phải nhập
        default: "{{now}}"             # Tự động lấy ngày hiện tại [citation:2]
      
      - label: "Ảnh đại diện (tùy chọn)"
        name: "thumbnail"
        widget: "image"                # Ô tải ảnh lên [citation:2]
        required: false
        hint: "Chọn ảnh để làm đại diện cho trang."
