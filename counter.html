<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Flag Counter – Hazun Test</title>

    <script>
        fetch('/hazun_test/templates/head.html')
            .then(res => res.text())
            .then(html => {
                document.head.insertAdjacentHTML('beforeend', html);
            })
            .catch(err => console.error('Lỗi tải bảo mật:', err));
    </script>
</head>
<body>
    <header role="banner">
        <div id="menu"></div>
        <div id="clock"></div>
        <div id="chat"></div>
    </header>

    <main role="main">
        <h1>🌍 Flag Counter</h1>
        <a href="https://info.flagcounter.com/EhXZ"><img src="https://s01.flagcounter.com/map/EhXZ/size_l/txt_0A89F7/border_150080/pageviews_1/viewers_0/flags_0/" alt="Flag Counter" border="0"></a>
        <a href="https://info.flagcounter.com/MlJJ"><img src="https://s01.flagcounter.com/count2/MlJJ/bg_D4EEFF/txt_2A7AB0/border_2A7AB0/columns_8/maxflags_250/viewers_0/labels_0/pageviews_0/flags_0/percent_0/" alt="Flag Counter" border="0"></a>
        <a href="https://info.flagcounter.com/N4Gk"><img src="https://s01.flagcounter.com/count2/N4Gk/bg_D4EEFF/txt_2A7AB0/border_2A7AB0/columns_8/maxflags_250/viewers_0/labels_0/pageviews_0/flags_0/percent_1/" alt="Flag Counter" border="0"></a>
    </main>

    <footer role="contentinfo">
        <button class="pdf-btn" onclick="window.print()">📄 Lưu trang này thành PDF</button>
    </footer>
    
    <script src="templates/load.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadTemplate('menu', 'menu.html');
            loadTemplate('clock', 'clock.html');
            loadTemplate('chat', 'chat.html');
        });
    </script>
</body>
</html>
